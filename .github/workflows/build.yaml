name: android-релиз

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  HAS_KEYSTORE: ${{ secrets.KEYSTORE != '' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Проверить release notes
        run: |
          python3 .github/scripts/validate_release_notes.py \
            --tag "${{ github.ref_name }}"

      - name: Настроить подпись Android
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS_VALUE: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD_VALUE: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_VALUE: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${KEYSTORE_B64}" | base64 --decode > android/app/keystore.jks
          {
            echo "keyAlias=${KEY_ALIAS_VALUE}"
            echo "storePassword=${STORE_PASSWORD_VALUE}"
            echo "keyPassword=${KEY_PASSWORD_VALUE}"
          } >> android/local.properties

      - name: Проверить подпись Android для стабильного релиза
        if: env.IS_STABLE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS_VALUE: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD_VALUE: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_VALUE: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "${KEYSTORE_B64}" ] || [ -z "${KEY_ALIAS_VALUE}" ] || [ -z "${STORE_PASSWORD_VALUE}" ] || [ -z "${KEY_PASSWORD_VALUE}" ]; then
            echo "Стабильные Android-релизы должны быть подписаны релизными ключами форка." >&2
            exit 1
          fi

      - name: Настроить Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Кэшировать Go build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('core/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Настроить Java для Android/Gradle
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Настроить Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Определить Android NDK
        run: |
          latest_ndk="$(find "${ANDROID_HOME}/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          if [ -z "${latest_ndk}" ]; then
            echo "ANDROID_NDK не найден в ${ANDROID_HOME}/ndk" >&2
            exit 1
          fi
          echo "ANDROID_NDK=${latest_ndk}" >> "${GITHUB_ENV}"

      - name: Получить зависимости Flutter
        run: |
          flutter --version
          flutter pub get

      - name: Проверить Flutter analyze
        run: flutter analyze lib test setup.dart

      - name: Запустить Android-регрессионные тесты
        run: flutter test test/common

      - name: Собрать Android-артефакты
        run: dart setup.dart android ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Загрузить Android-артефакты
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-dist
          path: ./dist
          overwrite: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Получить код
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Скачать Android-артефакты
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-dist
          path: ./dist

      - name: Сформировать release notes
        run: |
          python3 .github/scripts/build_release_notes.py \
            --tag "${{ github.ref_name }}" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}" \
            --tech-notes-dir docs/releases \
            --output release.md \
            --summary-output release_summary.txt

      - name: Сгенерировать sha256
        run: |
          cd ./dist
          find . -type f -not -name '*.sha256' -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: FlClash ${{ github.ref_name }}
          prerelease: ${{ env.IS_STABLE != 'true' }}
          files: ./dist/*
          body_path: ./release.md
